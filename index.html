    .btn-danger {

    // ── Утилиты ──────────────────────────────────────────────────────────
    function fuzzy(str, q) {
      const s = str.toLowerCase(),
        qt = q.toLowerCase().trim();
      if (!qt) return false;
      if (s.includes(qt)) return true;
      let qi = 0;
      for (let i = 0; i < s.length && qi < qt.length; i++)
        if (s[i] === qt[qi]) qi++;
      return qi === qt.length;
    }

    function buildAbbrs(meds) {
      const used = new Set();
      const allMeds = getAllMeds();
      return meds.map(m => {
        const md = allMeds.find(d => d.name === m.name);
        const hint = md ? md.hint : m.name[0];
        const candidates = [hint.toUpperCase(), m.name.slice(0, 2).toUpperCase(), m.name.slice(0, 3).toUpperCase(), m.name.slice(0, 4).toUpperCase()];
        for (const c of candidates) {
          if (!used.has(c)) {
            used.add(c);
            return c;
          }
        }
        let i = 1;
        const base = m.name.slice(0, 2).toUpperCase();
        while (used.has(base + i)) i++;
        used.add(base + i);
        return base + i;
      });
    }

    function getAllMeds() {

      if (freq === 1) return ['После пробуждения'];
      if (freq === 2) return ['После пробуждения', 'Перед сном'];
      if (freq === 3) return ['После пробуждения', 'Днём', 'Перед сном'];
      if (freq === 4) return ['После пробуждения', 'Днём', 'Вечером', 'Перед сном'];
      if (freq === 5) return ['После пробуждения', 'Днём', 'После обеда', 'Вечером', 'Перед сном'];
      return ['После пробуждения', 'Днём', 'После обеда', 'Вечером', 'Перед сном', 'Ночью (по необходимости)'];
    }

    function allSlots(meds) {
      let max = 1;
      meds.forEach(m => {
        if (m.taper) m.phases.forEach(p => {
          if (p.f > max) max = p.f;
        });
        else if (m.freq > max) max = m.freq;
      });
      return slotsByFreq(max);
    }

    function buildGrid(meds, abbrs) {
      let maxDay = 0;
      meds.forEach(m => {
        const d = m.taper ? m.phases.reduce((s, p) => s + p.d, 0) : m.dur;
        if (d > maxDay) maxDay = d;
      });
      const slots = allSlots(meds);
      const rows = [];
      for (let day = 1; day <= maxDay; day++) {
        const cells = {};
        slots.forEach(s => cells[s] = []);
        meds.forEach((med, mi) => {
          const abbr = abbrs[mi];
          const eSuffix = med.eye === 'both' ? '' : med.eye === 'right' ? ' (ПГ)' : ' (ЛГ)';
          let freq, active = false;
          if (med.taper) {
            let cum = 0;
            for (const ph of med.phases) {
              if (day > cum && day <= cum + ph.d) {
                freq = ph.f;
                active = true;
                break;
              }
              cum += ph.d;
            }
          } else {
            active = day <= med.dur;
            freq = med.freq;
          }
          if (!active) return;
          slotsByFreq(freq).forEach(s => {
            if (cells[s]) cells[s].push(abbr + eSuffix);
          });
        });
        rows.push({
          day,
          cells
        });
      }
      return {
        rows,
        slots
      };
    }

      myMedsCard.innerHTML = `<h3 style="margin-bottom:12px">Мои препараты <span style="font-size:12px;color:var(--muted)">(${CUSTOM_MEDS.length})</span></h3>`;
      const addMedBtn = el('button', 'btn btn-primary', {
        style: 'width:100%;margin-bottom:14px'
      });
      addMedBtn.textContent = '+ Добавить свой препарат';
      addMedBtn.onclick = showAddMedModal;
      myMedsCard.appendChild(addMedBtn);
      if (CUSTOM_MEDS.length > 0) {
        const medsList = el('div');
        CUSTOM_MEDS.forEach((m, i) => {
          const row = el('div', 'med-row', {
            style: 'padding:8px 0'
          });
          row.innerHTML = `
        <div style="display:flex;align-items:center;gap:8px">
          <span class="abbr-badge">${m.hint}</span>
          <span style="font-weight:600">${m.name}</span>
          <span class="tag tag-cat">${m.cat}</span>
        </div>`;
          const delBtn = el('button', 'btn btn-sm btn-danger');
          delBtn.textContent = '🗑';
          delBtn.onclick = (e) => {
            e.stopImmediatePropagation();
            if (confirm('Удалить препарат «' + m.name + '»?')) {
              CUSTOM_MEDS.splice(i, 1);
              saveCustomData();
              render();
            }
          };
          row.appendChild(delBtn);
          medsList.appendChild(row);
        });
        myMedsCard.appendChild(medsList);
      } else {
        const empty = el('div', 'muted', {
          style: 'text-align:center;padding:20px 0;font-size:13px'
        });
        empty.textContent = 'Здесь будут ваши личные препараты';
        myMedsCard.appendChild(empty);
      }
      right.appendChild(myMedsCard);
      // Правила
      const rulesCard = el('div', 'card', {
        style: 'background:#f8fafc;border:none'
      });
      rulesCard.innerHTML = `<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:10px">Как работает расписание</div>
  <div style="display:flex;flex-direction:column;gap:6px;font-size:13px">
    <div style="display:flex;gap:8px"><span style="font-family:monospace;font-weight:700;min-width:32px">1×</span><span class="muted">Только утром</span></div>
    <div style="display:flex;gap:8px"><span style="font-family:monospace;font-weight:700;min-width:32px">2×</span><span class="muted">Утро + Вечер</span></div>
    <div style="display:flex;gap:8px"><span style="font-family:monospace;font-weight:700;min-width:32px">3×</span><span class="muted">Утро + День + Вечер</span></div>
    <div style="display:flex;gap:8px"><span style="font-family:monospace;font-weight:700;min-width:32px">4×+</span><span class="muted">Равномерно в течение дня</span></div>
  </div>`;
      right.appendChild(rulesCard);
      layout.appendChild(right);
      app.appendChild(layout);
    }

function renderChecklist(app) {
  const abbrs = buildAbbrs(S.meds);
  const startDate = new Date(S.startDate);
  
  // Панель управления
  const topBar = el('div', 'no-print', {
    style: 'display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap'
  });
  const backBtn = el('button', 'btn');
  backBtn.innerHTML = '← Назад к конструктору';
  backBtn.onclick = () => { S.view = 'builder'; render(); };
  
  const copyBtn = el('button', 'btn', {
    style: 'background:#10b981;color:white;border-color:#10b981'
  });
  copyBtn.innerHTML = '📋 Скопировать назначение';
  copyBtn.onclick = () => copyPrescriptionToClipboard();
  
  const printBtn = el('button', 'btn btn-primary');
  printBtn.innerHTML = '🖨️ Печать / PDF';
  printBtn.onclick = () => window.print();
  
  topBar.append(backBtn, copyBtn, printBtn);
  app.appendChild(topBar);
  
  const printArea = el('div', '', { id: 'print-area' });
  
  // ====================== ШАПКА + ЛЕГЕНДА ======================
  const headerBlock = el('div', '', { style: 'margin-bottom:24px' });
  const titleRow = el('div', '', {
    style: 'display:flex;justify-content:space-between;align-items:flex-end;padding-bottom:12px;border-bottom:3px solid var(--blue)'
  });
  
  const tLeft = el('div');
  // 🔧 ИСПРАВЛЕННЫЙ БЛОК — шаблонная строка должна быть цельной:
  tLeft.innerHTML = `<h2 style="font-size:19px;margin:0">Схема закапывания глазных капель</h2>` +
    (S.patient ? `<div style="font-size:14px;margin-top:6px">Пациент: <strong>${S.patient}</strong></div>` : '');
  
  const tRight = el('div', 'muted', { style: 'font-size:13px;text-align:right' });
  tRight.innerHTML = `Дата начала: <strong>${fmtDate(S.startDate)}</strong>`;
  
  titleRow.append(tLeft, tRight);
  headerBlock.appendChild(titleRow);
  
  // ====================== ЛЕГЕНДА ======================
  const legendBox = el('div', '', {
    style: 'background:var(--blue-light);border-radius:var(--radius-lg);padding:18px;margin-top:16px'
  });
  legendBox.innerHTML = `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--blue);margin-bottom:12px">Обозначения препаратов</div>`;
  
  const cats = {};
  S.meds.forEach((m, i) => {
    const medData = getAllMeds().find(d => d.name === m.name);
    const c = medData ? medData.cat : 'Прочее';
    if (!cats[c]) cats[c] = [];
    cats[c].push({ ...m, abbr: abbrs[i] });
  });
  
  const lgGrid = el('div', 'legend-grid');
  Object.entries(cats).forEach(([cat, items]) => {
    const col = el('div', 'legend-cat');
    col.innerHTML = `<h4 style="margin-bottom:8px">${cat}</h4>`;
    items.forEach(m => {
      const oc = m.eye === 'both' ? 'ОГ' : m.eye === 'right' ? 'ПГ' : 'ЛГ';
      const row = el('div', 'legend-row');
      row.innerHTML = `<span class="abbr-badge">${m.abbr}</span><span style="font-size:14px">${m.name}</span><span class="muted" style="font-size:12px">${oc}</span>`;
      col.appendChild(row);
    });
    lgGrid.appendChild(col);
  });
  legendBox.appendChild(lgGrid);
  
  const legendNote = el('div', '', { style: 'margin-top:14px;font-size:12px;color:var(--muted)' });
  legendNote.textContent = 'ОГ — оба глаза · ПГ — правый глаз · ЛГ — левый глаз';
  legendBox.appendChild(legendNote);
  
  headerBlock.appendChild(legendBox);
  printArea.appendChild(headerBlock);
  app.appendChild(printArea);
      // Таблица
      const {
        rows,
        slots
      } = buildGrid(S.meds, abbrs);
      const wrap = el('div', 'checklist-wrap');
      const table = el('table', 'checklist');
      table.style.tableLayout = 'fixed';
      table.style.width = '100%';
      const cg = document.createElement('colgroup');
      const c0 = document.createElement('col');
      c0.style.width = '92px';
      cg.appendChild(c0);
      slots.forEach(() => {
        const c = document.createElement('col');
        c.style.width = Math.floor(90 / slots.length) + '%';
        cg.appendChild(c);
      });
      table.appendChild(cg);
      const thead = document.createElement('thead');
      const hr = document.createElement('tr');
      const th0 = document.createElement('th');
      th0.className = 'day-th';
      th0.textContent = 'День / Дата';
      hr.appendChild(th0);
      slots.forEach(s => {
        const th = document.createElement('th');
        th.textContent = s;
        hr.appendChild(th);
      });
      thead.appendChild(hr);
      table.appendChild(thead);
      const tbody = document.createElement('tbody');
      rows.forEach(row => {
        const tr = document.createElement('tr');
        tr.style.pageBreakInside = 'auto';
        const td0 = document.createElement('td');
        td0.style.fontWeight = '700';
        td0.style.padding = '10px 8px';
        const currentDate = new Date(startDate);
        currentDate.setDate(startDate.getDate() + row.day - 1);
        td0.innerHTML = `
      <div style="font-size:15px">${row.day}</div>
      <div style="font-size:12.5px;color:#64748b">${fmtDate(currentDate.toISOString().slice(0,10))}</div>
    `;
        tr.appendChild(td0);
        slots.forEach(s => {
          const td = document.createElement('td');
          const items = row.cells[s];
          if (items && items.length > 0) {
            const container = el('div', '', {
              style: 'display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-start'
            });
            items.forEach(label => {
              const pill = el('span', '', {
                style: `
            background:#f8fafc; border:1px solid #e2e8f0; border-radius:6px;
            padding:5px 9px; font-size:13px; font-weight:600;
            display:inline-flex; align-items:center; gap:5px;
            min-width:48px; justify-content:flex-start;
          `
              });
              pill.innerHTML = `<span class="checkbox-sq" style="width:17px;height:17px"></span> ${label}`;
              container.appendChild(pill);
            });
            td.appendChild(container);
          } else {
            td.innerHTML = '<span class="dash" style="color:#cbd5e1;font-size:16px">—</span>';
          }
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      wrap.appendChild(table);
      printArea.appendChild(wrap);
      // Инструкция
      const note = el('div', '', {
        style: 'margin-top:30px;padding-top:16px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)'
      });
      note.innerHTML = '<strong>Инструкция:</strong> Закапывайте по 1 капле на каждый приём. Между разными препаратами — интервал 5–10 минут. Отмечайте галочкой каждый приём.';
      printArea.appendChild(note);
      app.appendChild(printArea);
    }
    // ==================== ФУНКЦИЯ КОПИРОВАНИЯ ====================
    function copyPrescriptionToClipboard() {
      let text = '';
      if (S.patient) text += `Пациент: ${S.patient}\n`;
      text += `Дата начала: ${fmtDate(S.startDate)}\n\n`;
      text += `Схема закапывания глазных капель:\n\n`;
      S.meds.forEach((med, i) => {
        const eyeStr = med.eye === 'both' ? 'оба глаза' : med.eye === 'right' ? 'правый глаз' : 'левый глаз';
        let schedule = med.taper ? med.phases.map((p, idx) => `Фаза ${idx+1}: ${p.d} дней × ${p.f} раз/день`).join(' → ') : `${med.freq} раз/день, ${med.dur} дней`;
        text += `${i+1}. ${med.name} — ${eyeStr}\n`;
        text += `   ${schedule}\n\n`;
      });
      text += `Инструкция:\n`;
      text += `• Закапывать по 1 капле в каждый указанный приём\n`;
      text += `• Между разными препаратами — интервал 5–10 минут\n`;
      text += `• Отмечайте каждый приём в таблице\n`;
      navigator.clipboard.writeText(text.trim()).then(() => {
        const btns = document.querySelectorAll('button');
        const copyBtn = Array.from(btns).find(b => b.textContent.includes('Скопировать'));
        if (copyBtn) {
          const original = copyBtn.innerHTML;
          copyBtn.innerHTML = '✅ Скопировано!';
          setTimeout(() => {
            copyBtn.innerHTML = original;
          }, 2000);
        }
      }).catch(() => {
        alert('Не удалось скопировать текст');
      });
    }
    // ── Запуск ───────────────────────────────────────────────────────────
    initCustomData();
    loadSession();
    render();
  </script>
</body>
